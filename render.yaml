services:
  - type: web
    name: aceit-backend
    runtime: python
    rootDir: aceit_backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # You will paste this manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: FRONTEND_URL
        sync: false          # Set to your Vercel URL e.g. https://aceit.vercel.app
    healthCheckPath: /health
